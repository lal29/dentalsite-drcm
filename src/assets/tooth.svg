<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <!-- Drop shadow -->
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#2d5a4f" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="toothGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f7f5"/>
    </linearGradient>
    <linearGradient id="rootGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7f5"/>
      <stop offset="100%" stop-color="#d4ede8"/>
    </linearGradient>
  </defs>

  <!-- Tooth crown -->
  <path d="
    M 40 70
    C 20 70, 10 85, 10 105
    C 10 125, 20 140, 30 155
    C 38 167, 44 182, 50 200
    C 54 212, 66 214, 70 202
    C 75 186, 78 168, 100 168
    C 122 168, 125 186, 130 202
    C 134 214, 146 212, 150 200
    C 156 182, 162 167, 170 155
    C 180 140, 190 125, 190 105
    C 190 85, 180 70, 160 70
    C 148 70, 136 78, 100 78
    C 64 78, 52 70, 40 70 Z
  "
  fill="url(#toothGrad)"
  stroke="#d4ede8"
  stroke-width="2.5"
  filter="url(#shadow)"
  />

  <!-- Crown top bumps (cusps) -->
  <path d="
    M 40 70
    C 38 55, 45 35, 60 30
    C 72 26, 82 35, 100 35
    C 118 35, 128 26, 140 30
    C 155 35, 162 55, 160 70
  "
  fill="url(#toothGrad)"
  stroke="#d4ede8"
  stroke-width="2.5"
  />

  <!-- Shine highlight -->
  <path d="M 55 50 Q 65 38, 80 42 Q 70 55, 55 50 Z"
    fill="white" opacity="0.8"/>

  <!-- Green accent line -->
  <path d="M 45 95 Q 100 88, 155 95"
    fill="none" stroke="#4a7c6f" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

  <!-- Small sparkles -->
  <g fill="#d4a847">
    <circle cx="28" cy="50" r="3" opacity="0.7"/>
    <circle cx="172" cy="45" r="2" opacity="0.5"/>
    <circle cx="185" cy="62" r="1.5" opacity="0.4"/>
  </g>

  <!-- Cross sparkle left -->
  <g stroke="#d4a847" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
    <line x1="22" y1="38" x2="22" y2="46"/>
    <line x1="18" y1="42" x2="26" y2="42"/>
  </g>

  <!-- Cross sparkle right -->
  <g stroke="#4a7c6f" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
    <line x1="178" y1="30" x2="178" y2="36"/>
    <line x1="175" y1="33" x2="181" y2="33"/>
  </g>
</svg>

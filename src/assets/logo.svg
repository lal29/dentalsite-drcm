  <text x="84" y="50" font-family="Georgia, serif" font-size="22" fill="#1a2825" letter-spacing="1" font-weight="600">Macasiray</text>
  <text x="84" y="66" font-family="Arial, sans-serif" font-size="10" fill="#4a7c6f" letter-spacing="5">DENTAL CLINIC</text>
</svg>
